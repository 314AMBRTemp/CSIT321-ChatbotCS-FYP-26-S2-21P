<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopBot{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        /* ── Navbar ── */
        nav {
            background: #0057B8;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }

        nav .right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        nav a {
            color: white;
            text-decoration: none;
            opacity: 0.85;
        }

        nav a:hover { opacity: 1; }

        nav .btn {
            background: white;
            color: #0057B8;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        /* ── Chat bubble ── */
        #chat-bubble {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 58px;
            height: 58px;
            background: #0057B8;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 16px rgba(0,87,184,0.4);
            z-index: 1000;
            transition: transform 0.2s;
        }

        #chat-bubble:hover { transform: scale(1.08); }

        /* ── Chat window ── */
        #chat-window {
            display: none;
            position: fixed;
            bottom: 98px;
            right: 28px;
            width: 360px;
            height: 520px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        #chat-header {
            background: #0057B8;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-header .title  { font-weight: 700; font-size: 15px; }
        #chat-header .subtitle { font-size: 11px; opacity: 0.75; margin-top: 2px; }

        #chat-close {
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
        }

        #chat-close:hover { opacity: 1; }

        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9fafb;
        }

        .message {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .user-message {
            background: #0057B8;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing {
            background: white;
            color: #999;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            font-style: italic;
            font-size: 13px;
        }

        #chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
            background: white;
        }

        #chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 13.5px;
            transition: border-color 0.2s;
        }

        #chat-input:focus { border-color: #0057B8; }

        #chat-send {
            background: #0057B8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        #chat-send:hover { background: #0041a8; }

    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav>
    <h1>🛍️ ShopBot</h1>
    <div class="right">
        <span style="opacity: 0.8;">Customer Support Portal</span>
        {% if current_user.is_authenticated %}
            <a href="/customer/dashboard" class="btn">My Orders</a>
            <a href="/customer/logout">Logout</a>
        {% else %}
            <a href="/customer/login" class="btn">Login</a>
            <a href="/admin/login">Admin</a>
        {% endif %}
    </div>
</nav>

<!-- Page content -->
{% block content %}{% endblock %}

<!-- Chat bubble -->
<div id="chat-bubble" onclick="toggleChat()">💬</div>

<!-- Chat window -->
<div id="chat-window">
    <div id="chat-header">
        <div>
            <div class="title">ShopBot Support</div>
            <div class="subtitle">Typically replies instantly</div>
        </div>
        <div id="chat-close" onclick="toggleChat()">✕</div>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input
            id="chat-input"
            type="text"
            placeholder="Type a message..."
            onkeypress="handleKey(event)"
        />
        <button id="chat-send" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    let sessionId = "session-" + Math.random().toString(36).substring(2);
    let chatOpen  = false;
    let greeted   = false;

    function toggleChat() {
    chatOpen = !chatOpen;
    const win = document.getElementById("chat-window");
    win.style.display = chatOpen ? "flex" : "none";

    if (chatOpen && !greeted) {
        greeted = true;

        // Personalise greeting based on login state
        {% if current_user.is_authenticated %}
            addMessage("👋 Welcome back, {{ current_user.name }}! I can help you track your package, update your delivery address, cancel an order, or raise a support ticket.\n\nHow can I help you today?", "bot");
        {% else %}
            addMessage("👋 Hello! I'm ShopBot. I can help you track your package, update your delivery address, cancel an order, or raise a support ticket.\n\nHow can I help you today?", "bot");
        {% endif %}
    }

    if (chatOpen) {
        document.getElementById("chat-input").focus();
    }
}

    function handleKey(event) {
        if (event.key === "Enter") sendMessage();
    }

    function addMessage(text, sender) {
        const messages = document.getElementById("chat-messages");
        const div      = document.createElement("div");
        div.className  = `message ${sender}-message`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const input   = document.getElementById("chat-input");
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        const typing = addMessage("ShopBot is typing...", "typing");

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message:    message,
                    session_id: sessionId
                })
            });

            const data = await response.json();
            typing.remove();

            if (data.reply) {
                addMessage(data.reply, "bot");
            } else {
                addMessage("Sorry, I didn't get a response. Please try again.", "bot");
            }

        } catch (error) {
            typing.remove();
            addMessage("Sorry, something went wrong. Please try again.", "bot");
        }
    }
</script>

{% block extra_scripts %}{% endblock %}

</body>
</html>
